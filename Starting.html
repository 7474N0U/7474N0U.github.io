<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF1A1A">

    <link rel="stylesheet" href="./assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./posters/maskable-icon.png">
    <link rel="icon" type="image/png" href="./posters/favicon.png">
    <link rel="stylesheet" href="./assets/style.css">
    
    <title>Maestro Starting Page</title>

</head>
<body style="position: fixed; inset: 0; overflow: hidden;">
    <div class="starting-glow"></div>
    
    <img src="./icons/maestro.svg" class="maestro-logo">

    <div class="level-container" data-step="1">
        <h1>Welcome</h1>
    </div>

    <div class="level-container" data-step="2">
        <h1>Step 2</h1>
    </div>

    <div class="level-container" data-step="3">
        <h1>Step 3</h1>
    </div>

    <div class="level-container" data-step="4">
        <h1>Step 4</h1>
    </div>

    <div class="starting-footer">
        <button class="btn btn-primary" style="max-width: 50%;" onclick="nextStep()">Next</button>
    </div>


    <script>
        let currentStep = 0;

        function showStep(step) {
            document.querySelectorAll('.level-container').forEach(el => {
                el.classList.toggle('active', el.dataset.step == step);
            });

            const total = document.querySelectorAll('.level-container').length;
            document.querySelector('.btn-primary').style.display = step >= total ? 'none' : '';
        }

        function nextStep() {
            currentStep++;
            showStep(currentStep);
        }

        showStep(0);

        setTimeout(() => {
            if (currentStep === 0) {
                currentStep = 1;
                showStep(currentStep);
            }
        }, 6300);
    </script>

</body>
