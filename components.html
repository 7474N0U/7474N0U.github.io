<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./assets/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Primary btn-->
    <button class="btn btn-primary">Primary</button>
    <!--Secondary-btn-->
    <button class="btn btn-secondary">Secondary</button>

    <!--Toggle-->
    <label class="toggle-switch">
        <input type="checkbox" class="toggle-input">
        <div class="toggle-slider">
            <span class="label-off">OFF</span>
            <span class="label-on">ON</span>
            <div class="indicator"></div>
        </div>
    </label>

    <!--case-->
    <div class="case">
        <svg class="gear-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        
        <h2 class="case-title">Settings</h2>
        <p class="case-subtitle">Settings</p>
    </div>
    <!--Toggle-case-->
    <div class="case toggle-case">
    <h2 class="case-title">Title</h2>
    <p class="case-subtitle">Desciption</p>
    
    <div class="toggle-wrapper">
        <label class="toggle-switch">
            <input type="checkbox" class="toggle-input">
            <div class="toggle-slider">
                <span class="label-off">OFF</span>
                <span class="label-on">ON</span>
                <div class="indicator"></div>
            </div>
        </label>
    </div>
    
    <!--Selector-icon-->
    <div class="selector-container">
        <input type="radio" id="icon1" name="choix-icon" checked>
        <label class="selector-item item-icon" for="icon1">
            <svg class="icon">...</svg>
        </label>

        <input type="radio" id="icon2" name="choix-icon">
        <label class="selector-item item-icon" for="icon2">
            <svg class="icon">...</svg>
        </label>
    </div>

    <!--Selector-text-->

    <div class="selector-container is-vertical">
        <input type="radio" id="text1" name="choix-text" checked>
        <label class="selector-item item-text" for="text1">Première option</label>

        <input type="radio" id="text2" name="choix-text">
        <label class="selector-item item-text" for="text2">Deuxième option</label>
    </div>


</div>
</body>
</html>
